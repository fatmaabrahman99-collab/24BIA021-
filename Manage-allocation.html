<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Users</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
<style>
body{
    background:whitesmoke;
    margin:0;
    font-family: Arial, sans-serif;
}
.admin-profile {
    display: flex;
    align-items: center;
}
.admin-profile img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    margin-left: 10px;
            
}
.main-wrapper{
    display:flex;
    min-height: 100px;
}
#sidebar{
    width:260px;
    height:100vh;
    background:darkblue;
    color:white;
    position:fixed;
}

.sidebar-header{
    text-align:left;
    padding:20px;
    background-color: lightblue;
}

#sidebar ul{
    list-style:none;
    padding:10px;
}

#sidebar ul li{
    padding:12px;
    border-radius:5px;
    transition:0.3s;
}

#sidebar ul li:hover{
    background:blue;
}

#sidebar ul li a{
    color:white;
   display: block;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
}


.main{
    margin-left:250px;
    width:100%;
}


.header{
    background:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid orange;
}

.menu-btn{
    background:blue;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}
.content{
    padding:20px;
    flex: 1px;
    display: flex;
    flex-direction: column;

}

.content h3{
    margin-bottom:15px;
}


.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    background-color: white;
    height: 60px;
    padding: 0 20px;
    
}

.add-btn{
    background:green;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.export-btn{
    margin-top:10px;
    background:white;
    padding:6px 10px;
    border:1px solid #aaa;
    cursor:pointer;
}


.search-box input{
    padding:6px;
    border:1px solid gray;
    border-radius:5px;
    outline:none;
}


table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    border-bottom:0px solid  black;
    background:white;
}


td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    border-bottom:4px solid  black;
}

tr:hover{
    background:whitesmoke;
}
.actions button{
    padding:5px 8px;

    color:white;
    cursor:pointer;
}

.edit{ background:orange; }
.delete{ background:red; }
.block{ background:gray; }
.input-box input{
    width: 100%;
}
.footer{
    text-align:center;
    padding:15px;
    font-size:12px;
    color:gray;
    margin-top:20px;
}
.form-group {
    display: black;
    align-items: center;
    flex: 1; 
    gap: 10px;
}
.form-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
}
.form-group label {
    display: flex; 
    margin-bottom: 5px;
    
}
.form-group label {
    display: flex; 
    margin-bottom: 5px;
    
}
.button-container {
    display: flex;
    justify-content: flex-end;
    padding-top: 15px;
}
</style>
</head>
<body>
<div class="main-wrapper">
    <div id="sidebar">
        <div class="sidebar-header">
            <img src="images/suza.png" width="60" align-items="left"> 
        </div>
        <div class="admin-profile">
         <ul>
            <li><a href="dashboard.html"><img src="images/dashboard.png" width="50px">Dashboard</a></li>
            <li><a href="manage users.html"><img src="images/Users.png" width="50px">Manage Users</a></li>
            <li><a href="manage-instructors.html"><img src="images/Instructors.PNG" width="50px">Manage Instructors</a></li>
            <li><a href="manage-students.html"><img src="images/Students.png" width="50px">Manage Students</a></li>
            <li><a href="manage-courses.html"><img src="images/Courses.png" width="50px">Manage Courses</a></li>
            <li><a href="manage-results.html"><img src="images/Results.png" width="50px">Manage Results</a></li>
            <li><a href="manage-allocation.html"><img src="images/Allocations.png" width="50px">Manage Allocations</a></li>
         </ul>
        </div>  
    </div>
    <div class="main">
        <div class="header">
             <button class="menu-btn">☰ </button>
             <div class="admin-profile">
                <b style="font-weight: bold; font-size: 14px;">Admin Name</b>
                <img src="images/Profile.png">
            </div>
            
        </div>
    <div class="container-fluid">
        <div class="row">

            <div class="col-md-10 p-4">
              <h2>manage allocations</h2>
                
<div class="row mb-2"> 
    <div class="col-md-4"> 
        <div class="form-group">
            <label class="fw-bold" style="font-size: 13px;">SELECT YEAR:</label>
            <select class="form-control form-control-sm">
                <option>2024</option>
                <option>2025</option>
            </select>
        </div>
    </div>
    <div class="col-md-4"> 
        <div class="form-group">
            <label class="fw-bold" style="font-size: 13px;">SELECT semister:</label>
            <select class="form-control form-control-sm">
                <option>semister 1</option>
                <option>semister 2</option>
            </select>
        </div>
    </div>
    <div class=" col-md-4">
        <div class="form-group">
            <button class="btn btn-primary">view allocations</button>
        </div>
        
    </div>
</div>
  

             
              
              <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#userModal"  style="width: 25%;">
                + Add New Students
              </button> <br>
            
             <table id="userTable" class="table table-striped">
                <thead>
                    <tr>
                        <th>Instractor</th>
                        <th>Course</th>
                        <th>Year</th>
                        <th>semister</th>
                        <th>Edit</th>
                        <th>Drop</th>
                        <th>Enroll students</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Dr. Smith</td>
                        <td>CSC Inf PROGRAMMING</td>
                        <td>2025</td>
                        <td>1</td>

                        <td>
                            <button class="btn edit">Edit</button>
                        </td>
                        <td>
                            <button class="btn delete">drop</button>
                        </td>
                        <td>
                            <button class="btn  btn-info">View</button>
                        </td>
                    </tr>
                    
                        
                </tbody>


            </table>


        </div>
        
    </div>
</div>


<div class="modal fade" id="userModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body">

                <div class="input-box">
                    <form id="userForm">
                        <h3>Add new Alloacation</h3>
                      
                      instructor:<input type="text"class="form-control mb-2" id="instructor" >
                    
                    
                        <label>Course</label>
                        <input type="text" class="form-control mb-2" id="course">
                        <label>year:</label>
                        <input type="number" class="form-control mb-2" id="year">
                    
                    
                        <label>Semister:</label>
                        <select id="role" class="form-control mb-2">
                         <option>1</option>
                         <option>2</option>
                        </select>
                         <div class="button-container">
                         
                            <button type="submit" class="btn btn-primary w-25">Save allocation</button>
                             <button type="submit" class="btn block">close</button>
                       
                        </div>
                       
                       
                    </form>
                    
                </div>
            </div>   
        </div>  
    </div>
</div>



<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function () {
        $('#userTable').DataTable();
        $('#userForm').on('submit', function (e) {
            e.preventDefault();
            let table = $('#userTable').DataTable();
            table.row.add([
                $('#Instractor').val(),
                $('#Course').val(),
            
                $('#Year').val(),
                $('#Semister').val(),
                '<button class="btn edit">Edit</button> ' +
                '<button class="btn delete">Drop</button>'
                
            ]).draw();

            $('#userForm')[0].reset();
            $('#userModal').modal('hide');
        });
    });
</script>

</body>
</html>
