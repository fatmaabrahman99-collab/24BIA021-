<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body {
            background-color: darkblue;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .login-card {
            display: flex;
            width: 850px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            min-height: 420px;
        }
        
        .left-side {
            flex: 1.1;
            background-color: black;
            color: white;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .left-side h2 {
            font-weight: bold;
            font-size: 2.2rem;
            margin-bottom: 30px;
            line-height: 1.2;
        }
        .info-text {
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }
        .info-text input { 
            margin-right: 12px; 
            margin-top: 5px; 
        }
        .login-link { 
            color: green; 
            text-decoration: none; 
            font-weight: bold; 
        }
        .login-link:hover { 
            text-decoration: underline; 
        }

        
        .right-side {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo-box img { 
            width: 130px; 
            margin-bottom: 35px; 
        }
        .form-container { 
            width: 100%; 
            max-width: 320px; 
        }
        .custom-input {
            width: 100%;
            padding: 10px 15px;
            background-color: lightgray;
            border: 1px solid   gray;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: gray;
            outline: none;
        }
        .custom-input::placeholder { 
            color: grey; 
        }
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .forgot-link { 
            color: rgb(94, 162, 250); 
            text-decoration: underline; 
        }

        .btn-signin {
            background-color: rgb(87, 87, 231);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="left-side">
            <h2>Student Management<br>System</h2>
            <div class="info-text">
                <input type="checkbox"> 
                <span>For Academic Staff? <a href="#" class="login-link">Login</a> here using your employee number.</span>
            </div>
            <div class="info-text">
                <input type="checkbox"> 
                <span>For Students? <a href="#" class="login-link">Login</a> here using your student number.</span>
            </div>
            <hr style="border-color: rgba(255,255,255,0.1); margin-top: 30px;">
        </div>

        <div class="right-side">
            <div class="logo-box">
                <img src="images/suza.png" alt="SUZA Logo">
            </div>
            
            <div class="form-container">
                <form action="dashboard.html">
                    <input type="text" class="custom-input" placeholder="Username" required>
                    <input type="password" class="custom-input" placeholder="Password" required>

                    <div class="options-row">
                        <label style="cursor:pointer"><input type="checkbox"> Remember me</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-signin">Sign In</button>
                </form>
            </div>
        </div>
    </div>
    

</body>
</html>
